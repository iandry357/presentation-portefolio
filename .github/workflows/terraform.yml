name: Terraform Infra

on:
  push:
    branches:
      - infra-scaleway-v1.1
    paths:
      - 'infra/**'
  pull_request:
    branches:
      - infra-scaleway-v1.1
    paths:
      - 'infra/**'

jobs:
  terraform:
    name: Terraform Plan / Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.6

      - name: Write terraform.tfvars
        run: echo "${{ secrets.TF_VARS_FILE }}" > terraform.tfvars

      - name: Write backend.hcl
        run: echo "${{ secrets.TF_BACKEND_CONFIG }}" > backend.hcl

      - name: Terraform Init
        run: terraform init -backend-config="backend.hcl"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var-file="terraform.tfvars" -out=tfplan

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/infra-scaleway-v1.1'
        run: terraform apply tfplan