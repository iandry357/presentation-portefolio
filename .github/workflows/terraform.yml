name: Terraform Infra

on:
  push:
    branches:
      - infra-scaleway-v1.1
    paths:
      - 'infra/**'
  pull_request:
    branches:
      - infra-scaleway-v1.1
    paths:
      - 'infra/**'
  workflow_dispatch:

jobs:
  terraform:
    name: Terraform Plan / Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    env:
      SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
      SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
      SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
      SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORG_ID }}
      SCW_DEFAULT_REGION: fr-par

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.6

      - name: Write terraform.tfvars
        env:
          CONTENT: ${{ secrets.TF_VARS_FILE }}
        run: echo "$CONTENT" > terraform.tfvars

      - name: Write backend.hcl
        env:
          CONTENT: ${{ secrets.TF_BACKEND_CONFIG }}
        run: echo "$CONTENT" > backend.hcl

      - name: Terraform Init
        run: terraform init -backend-config="backend.hcl"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var-file="terraform.tfvars" -out=tfplan

      - name: Terraform Apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/infra-scaleway-v1.1') ||
          github.event_name == 'workflow_dispatch'
        run: terraform apply tfplan